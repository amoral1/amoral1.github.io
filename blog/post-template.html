<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Post - Anaïs Morales</title>
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Saira+Extra+Condensed:500,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Muli:400,400i,800,800i" rel="stylesheet" type="text/css" />
    <link href="../css/styles.css" rel="stylesheet" />
    <link href="../css/custom.css" rel="stylesheet" />
    <style>
        .post-content pre {
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1.25rem 0 1.75rem;
            border-left: 4px solid #bdddf4;
        }
        .post-content code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            background-color: rgba(189, 221, 244, 0.15);
            color: #2c6e9a;
            padding: 0.1em 0.35em;
            border-radius: 3px;
        }
        .post-content pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: inherit;
        }
        .post-content h2 {
            font-family: 'Saira Extra Condensed', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }
        .post-content h3 {
            font-family: 'Muli', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #bdddf4;
            margin-top: 1.5rem;
            margin-bottom: 0.4rem;
        }
        .post-content p, .post-content li {
            font-family: 'Muli', sans-serif;
            font-size: 1rem;
            line-height: 1.8;
        }
        .post-content ul, .post-content ol {
            padding-left: 1.4rem;
            margin-bottom: 1.2rem;
        }
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 1.5rem 0;
        }
        .post-content a { color: #bdddf4; }
        .post-content a:hover { color: #8abcd8; }
        .back-link {
            font-family: 'Saira Extra Condensed', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #bdddf4;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: #8abcd8; }
        .post-byline {
            font-family: 'Muli', sans-serif;
            font-size: 0.82rem;
            color: #868e96;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
            padding: 0.65rem 0;
            margin-bottom: 2rem;
        }
        .tag-badge {
            background-color: #bdddf4;
            color: #333;
            font-weight: 500;
            font-size: 0.7rem;
            padding: 0.25em 0.55em;
            border-radius: 3px;
            margin-right: 0.3rem;
            display: inline-block;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body id="page-top">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" id="sideNav" style="background-color: #bdddf4;">
        <a class="navbar-brand" href="../index.html">
            <span class="d-block d-lg-none">Anaïs Morales</span>
            <span class="d-none d-lg-block"></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../index.html#about">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="../index.html#projects">Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#education">Education</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#skills">Skills</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#interests">Interests</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#awards">Awards</a></li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid p-0">
        <section class="resume-section" id="post">
            <div class="resume-section-content" id="article">
                <p class="text-muted">Loading…</p>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/scripts.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('post');

        if (!file) {
            window.location.href = '../index.html#projects';
        } else {
            // First load metadata from posts.json, then fetch the post HTML file
            fetch('posts.json')
                .then(r => r.json())
                .then(posts => {
                    const meta = posts.find(p => p.file === file);
                    if (!meta) { window.location.href = '../index.html#projects'; return; }

                    document.title = meta.title + ' - Anaïs Morales';

                    const tags = (meta.tags || [])
                        .map(t => `<span class="tag-badge">${t}</span>`)
                        .join('');

                    // Now fetch the actual post HTML file
                    return fetch(file)
                        .then(r => r.text())
                        .then(html => {
                            document.getElementById('article').innerHTML = `
                                <a class="back-link" href="../#projects">&larr; Back to Projects</a>

                                <h1 class="mb-0">${meta.title}</h1>
                                <div class="subheading mb-3">${meta.category}</div>
                                <div class="post-byline">
                                    Anaïs Morales &nbsp;&middot;&nbsp; ${meta.date} &nbsp;&middot;&nbsp; ${meta.readtime}
                                </div>

                                <div class="post-content mb-4">${html}</div>

                                <div class="mb-5">${tags}</div>
                                <hr class="m-0 mb-4" />
                                <a class="back-link" href="../#projects">&larr; Back to Projects</a>
                            `;
                        });
                })
                .catch(() => {
                    document.getElementById('article').innerHTML =
                        '<p>Post could not be loaded. <a href="../index.html#projects">Return to Projects.</a></p>';
                });
        }
    </script>
</body>
</html>
